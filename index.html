<div class="modal" id="modal">
  <div class="modal-content">
    <h3>Create Job</h3>

    <select id="building">
      <option value="ESR">ESR</option>
      <option value="CALIFORNIA">CALIFORNIA</option>
      <option value="G+9">G+9</option>
      <option value="G+7">G+7</option>
    </select>

    <input id="flat" placeholder="Flat (A-203)">
    <input id="issue" placeholder="Issue (Water Leak)">

    <select id="priority">
      <option>High</option>
      <option>Medium</option>
      <option>Low</option>
    </select>

    <div class="modal-buttons">
      <button onclick="closeModal()">Cancel</button>
      <button class="primary" onclick="createJob()">Save</button>
    </div>
	<textarea id="notes" placeholder="Notes..." style="width:100%;margin-bottom:10px;"></textarea>
<input type="file" id="image" accept="image/*">
  </div>
</div>
