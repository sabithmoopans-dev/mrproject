<!DOCTYPE html>
<html>
<head>
  <title>Maintenance App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen">

<!-- HEADER -->
<div class="bg-blue-600 text-white p-4 flex justify-between items-center shadow">
  <h1 class="text-lg font-semibold">Maintenance</h1>
  <span class="text-sm opacity-80">Admin</span>
</div>

<!-- STATS (Mobile Compact) -->
<div class="flex justify-around bg-white py-4 shadow-sm text-center">
  <div>
    <p id="totalJobs" class="font-bold text-lg">0</p>
    <p class="text-xs text-gray-500">Total</p>
  </div>
  <div>
    <p id="openJobs" class="font-bold text-blue-600 text-lg">0</p>
    <p class="text-xs text-gray-500">Open</p>
  </div>
  <div>
    <p id="completedJobs" class="font-bold text-green-600 text-lg">0</p>
    <p class="text-xs text-gray-500">Done</p>
  </div>
</div>

<!-- JOB CARDS -->
<div id="jobs" class="p-4 space-y-4 pb-24"></div>

<!-- FLOATING ACTION BUTTON -->
<button onclick="openModal()"
  class="fixed bottom-20 right-5 bg-blue-600 text-white w-14 h-14 rounded-full shadow-lg text-2xl">
  +
</button>

<!-- BOTTOM NAV -->
<div class="fixed bottom-0 left-0 right-0 bg-white shadow-inner flex justify-around py-3 text-sm">
  <div class="text-blue-600">🏠 Home</div>
  <div>📋 Jobs</div>
  <div>🔔 Alerts</div>
  <div>👤 Profile</div>
</div>

<!-- CREATE JOB MODAL -->
<div id="modal"
  class="fixed inset-0 bg-black bg-opacity-40 hidden flex items-center justify-center">
  <div class="bg-white w-11/12 p-5 rounded-2xl shadow-xl">
    <h2 class="font-semibold text-lg mb-4">Create Job</h2>

    <input id="flat" placeholder="Flat (C-105)"
      class="border p-3 w-full mb-3 rounded-lg">

    <input id="issue" placeholder="Issue (Water Leak)"
      class="border p-3 w-full mb-3 rounded-lg">

    <select id="priority"
      class="border p-3 w-full mb-4 rounded-lg">
      <option>High</option>
      <option>Medium</option>
      <option>Low</option>
    </select>

    <div class="flex gap-3">
      <button onclick="closeModal()"
        class="w-1/2 bg-gray-300 py-2 rounded-lg">
        Cancel
      </button>
      <button onclick="createJob()"
        class="w-1/2 bg-blue-600 text-white py-2 rounded-lg">
        Save
      </button>
    </div>
  </div>
</div>

<script>
function getJobs() {
  return JSON.parse(localStorage.getItem("jobs")) || [];
}

function saveJobs(jobs) {
  localStorage.setItem("jobs", JSON.stringify(jobs));
}

function openModal() {
  modal.classList.remove("hidden");
}

function closeModal() {
  modal.classList.add("hidden");
}

function createJob() {
  if (!flat.value || !issue.value) return alert("Fill all fields");

  let jobs = getJobs();

  jobs.push({
    flat: flat.value,
    issue: issue.value,
    priority: priority.value,
    status: "New",
    time: new Date().toLocaleTimeString()
  });

  saveJobs(jobs);
  flat.value = "";
  issue.value = "";
  closeModal();
  loadJobs();
}

function loadJobs() {
  let jobs = getJobs();
  const container = document.getElementById("jobs");
  container.innerHTML = "";

  totalJobs.innerText = jobs.length;
  openJobs.innerText = jobs.filter(j => j.status !== "Completed").length;
  completedJobs.innerText = jobs.filter(j => j.status === "Completed").length;

  jobs.slice().reverse().forEach((job, index) => {

    let priorityColor =
      job.priority === "High" ? "bg-red-500" :
      job.priority === "Medium" ? "bg-yellow-500" :
      "bg-green-500";

    let statusColor =
      job.status === "Completed" ? "bg-green-500" :
      job.status === "In Progress" ? "bg-blue-500" :
      "bg-gray-500";

    container.innerHTML += `
      <div class="bg-white p-4 rounded-2xl shadow-md">
        <div class="flex justify-between items-center mb-2">
          <h3 class="font-semibold text-lg">${job.flat}</h3>
          <span class="text-white text-xs px-3 py-1 rounded-full ${statusColor}">
            ${job.status}
          </span>
        </div>

        <p class="text-gray-600 mb-3">${job.issue}</p>

        <div class="flex justify-between items-center">
          <span class="text-white text-xs px-3 py-1 rounded-full ${priorityColor}">
            ${job.priority}
          </span>

          <button onclick="changeStatus(${jobs.length - 1 - index})"
            class="text-blue-600 text-sm font-medium">
            Change
          </button>
        </div>

        <p class="text-xs text-gray-400 mt-3">
          🕒 ${job.time}
        </p>
      </div>
    `;
  });
}

function changeStatus(index) {
  let jobs = getJobs();

  if (jobs[index].status === "New")
    jobs[index].status = "In Progress";
  else if (jobs[index].status === "In Progress")
    jobs[index].status = "Completed";
  else
    jobs[index].status = "New";

  saveJobs(jobs);
  loadJobs();
}

loadJobs();
</script>

</body>
</html>
