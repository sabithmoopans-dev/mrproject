<!DOCTYPE html>
<html>
<head>
  <title>Technician Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-6">

<div class="flex justify-between items-center mb-6">
  <h1 class="text-3xl font-bold">Technician Dashboard</h1>
  <a href="index.html" class="bg-gray-600 text-white px-4 py-2 rounded">Home</a>
</div>

<div id="jobs"></div>

<script>
function getJobs() {
  return JSON.parse(localStorage.getItem("jobs")) || [];
}

function saveJobs(jobs) {
  localStorage.setItem("jobs", JSON.stringify(jobs));
}

function loadJobs() {
  let jobs = getJobs();
  const container = document.getElementById("jobs");
  container.innerHTML = "";

  jobs.forEach((job, index) => {

    let priorityColor =
      job.priority === "High" ? "bg-red-500" :
      job.priority === "Medium" ? "bg-yellow-500" :
      "bg-green-500";

    container.innerHTML += `
      <div class="bg-white p-4 rounded shadow mb-4">
        <div class="flex justify-between">
          <h3 class="font-bold">${job.flat}</h3>
          <span class="${job.status === 'Completed' ? 'text-green-600' : 'text-blue-600'}">
            ${job.status}
          </span>
        </div>

        <p class="mt-2">${job.issue}</p>

        <div class="flex justify-between items-center mt-3">
          <span class="text-white text-sm px-2 py-1 rounded ${priorityColor}">
            ${job.priority}
          </span>

          ${job.status !== "Completed" ? `
          <button onclick="completeJob(${index})"
            class="bg-green-500 text-white px-3 py-1 rounded text-sm">
            Mark Completed
          </button>` : ""}
        </div>
      </div>
    `;
  });
}

function completeJob(index) {
  let jobs = getJobs();
  jobs[index].status = "Completed";
  saveJobs(jobs);
  loadJobs();
}

loadJobs();
</script>

</body>
</html>
